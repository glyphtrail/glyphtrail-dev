version: 2

updates:
  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch
      actions-major:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - major

  # npm/Yarn dependencies (package.json + yarn.lock).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-minor:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch
      npm-major:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - major
