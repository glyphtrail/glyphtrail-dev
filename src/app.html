<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0f17" />
    <meta name="color-scheme" content="dark" />

    <meta
      name="description"
      content="glyphtrail builds a queryable map of your codebase so coding agents get exact answers about references, call graphs and blast radius - not guesses from grep."
    />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="glyphtrail - dependency search & blast radius for coding agents" />
    <meta
      property="og:description"
      content="A queryable map of your codebase. Exact structural answers for LLM coding agents, over CLI and MCP."
    />
    <meta property="og:site_name" content="glyphtrail" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
